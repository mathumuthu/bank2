<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Stackly Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            min-height: 100vh;
        }

        /* Left Side - Image */
        .image-section {
            flex: 1;
            background: linear-gradient(135deg, rgba(10,10,10,0.7) 0%, rgba(10,10,10,0.3) 100%),
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200&h=800&fit=crop') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
            position: relative;
        }

        .image-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.3) 50%, transparent 100%);
        }

        .image-content {
            position: relative;
            z-index: 2;
        }

        .logo {
            position: absolute;
            top: 40px;
            left: 60px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #d4af37;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #0a0a0a;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .image-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .image-content p {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
            max-width: 400px;
        }

        .features {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .feature-icon {
            width: 44px;
            height: 44px;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            font-size: 18px;
            flex-shrink: 0;
        }

        .feature-text h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .feature-text p {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        /* Right Side - Form */
        .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: #0a0a0a;
            overflow-y: auto;
        }

        .form-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .form-header {
            margin-bottom: 35px;
        }

        .form-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .form-header p {
            font-size: 15px;
            color: rgba(255,255,255,0.6);
        }

        .form-header a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .form-header a:hover {
            color: #e8c84a;
        }

        .name-row {
            display: flex;
            gap: 16px;
        }

        .name-row .form-group {
            flex: 1;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 16px;
            transition: color 0.3s;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group select {
            appearance: none;
            cursor: pointer;
            padding-right: 40px;
        }

        .form-group select option {
            background: #1a1a1a;
            color: #ffffff;
        }

        .select-arrow {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            pointer-events: none;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #d4af37;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .form-group input:focus + i,
        .input-wrapper:focus-within i {
            color: #d4af37;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #d4af37;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 25px;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #d4af37;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms label {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            cursor: pointer;
        }

        .terms a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 500;
        }

        .terms a:hover {
            color: #e8c84a;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            background: #e8c84a;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .divider-text {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .signin-link {
            text-align: center;
            font-size: 15px;
            color: rgba(255,255,255,0.6);
        }

        .signin-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signin-link a:hover {
            color: #e8c84a;
        }

        /* Mobile Responsive */
        @media (max-width: 992px) {
            .container {
                flex-direction: column;
            }

            .image-section {
                min-height: 280px;
                padding: 30px;
                justify-content: center;
            }

            .logo {
                top: 20px;
                left: 30px;
            }

            .image-content h2 {
                font-size: 28px;
            }

            .features {
                display: none;
            }

            .form-section {
                padding: 40px 30px;
            }
        }

        @media (max-width: 480px) {
            .image-content h2 {
                font-size: 24px;
            }

            .form-header h1 {
                font-size: 28px;
            }

            .name-row {
                flex-direction: column;
                gap: 0;
            }

            .social-login {
                flex-direction: column;
            }

            .terms label {
                font-size: 13px;
            }
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-wrapper {
            animation: fadeInUp 0.8s ease-out;
        }

        .image-content {
            animation: fadeInUp 1s ease-out 0.2s both;
        }
    </style>
</head>

        <div class="form-section">
            <div class="form-wrapper">
                <div class="form-header">
                    <h1>Create Account</h1>
                    <p>Already have an account? <a href="sig.html">Sign in</a></p>
                </div>

                <form id="signupForm">
                    <div class="name-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="firstName" placeholder="John" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="lastName" placeholder="Doe" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="john@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" placeholder="+91 98765 43210" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="userType">I am a</label>
                        <div class="input-wrapper">
                            <i class="fas fa-users"></i>
                            <select id="userType" required>
                                <option value="" disabled selected>Select user type</option>
                                <option value="buyer">Home Buyer</option>
                                <option value="seller">Property Seller</option>
                                <option value="investor">Investor</option>
                                <option value="agent">Real Estate Agent</option>
                            </select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Create a password" required>
                            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        </div>
                    </div>

                    <div class="terms">
                        <input type="checkbox" id="agree" required>
                        <label for="agree">I agree to the <a href="404.html">Terms of Service</a> and <a href="404.html">Privacy Policy</a></label>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>

                    <div class="divider">
                        <div class="divider-line"></div>
                        <span class="divider-text">Or sign up with</span>
                        <div class="divider-line"></div>
                    </div>

                    <div class="social-login">
                        <button type="button" class="social-btn" onclick="window.location.href='404.html'">
                            <i class="fab fa-google"></i>
                        </button>
                        <button type="button" class="social-btn" onclick="window.location.href='404.html'">
                            <i class="fab fa-apple"></i>
                        </button>
                        <button type="button" class="social-btn" onclick="window.location.href='404.html'">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                    </div>

                    <!-- <p class="signin-link">
                        Already a member? <a href="signin.html">Sign In</a>
                    </p> -->
                </form>
            </div>
        </div>
    </div>

    <script>
        // Generate background particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }

        // Password toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Password match validation
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match! Please try again.');
                return;
            }

            alert('Account created successfully! Welcome to Stackly Real Estate.');
        });
    </script>
